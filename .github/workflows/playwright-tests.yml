name: Playwright Tests

on:
    push:
        branches: [main, master, develop]
    pull_request:
        branches: [main, master, develop]

jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write

        strategy:
            fail-fast: false
            matrix:
                php: ['8.3', '8.4']
                wordpress: ['6.8', '6.9', 'latest']

        name: Test PHP ${{ matrix.php }} / WP ${{ matrix.wordpress }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm i

            - name: Build plugin
              run: npm run build

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playwright tests
              id: tests
              continue-on-error: true
              run: npm run test:e2e
              env:
                  CI: true
                  WP_PLAYGROUND_PHP: ${{ matrix.php }}
                  WP_PLAYGROUND_WP: ${{ matrix.wordpress }}
                  WP_PLAYGROUND_PORT: 9400

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-php${{ matrix.php }}-wp${{ matrix.wordpress }}
                  path: test-results/
                  retention-days: 30
                  if-no-files-found: ignore

            - name: Comment PR with test results
              uses: daun/playwright-report-comment@v3
              if: always() && github.event_name == 'pull_request'
              with:
                  report-file: test-results/results.json

            - name: Fail if tests failed
              if: steps.tests.outcome == 'failure'
              run: exit 1
